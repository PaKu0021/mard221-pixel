<!DOCTYPE html>
<html lang="zh">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0"
>

<title>MARD221 Pixel Generator</title>

<style>

body{

    background:#111;
    color:white;
    font-family:sans-serif;
    text-align:center;
    padding:20px;
    margin:0;
}

h1{

    margin-bottom:20px;
}

.controls{

    margin-bottom:20px;
}

canvas{

    background:#222;
    border:1px solid #555;

    image-rendering:pixelated;

    max-width:95vw;
}

button,
input{

    margin:8px;
}

#info{

    margin-top:20px;

    white-space:pre-wrap;

    text-align:left;

    max-width:1000px;

    margin-left:auto;
    margin-right:auto;

    background:#1a1a1a;

    padding:12px;

    border-radius:8px;
}

</style>

</head>

<body>

<h1>MARD221 Pixel Generator</h1>

<div class="controls">

<input
type="file"
id="upload"
accept="image/*"
>

<br>

像素宽度：

<input
type="range"
id="pixelSize"
min="16"
max="128"
value="48"
>

<span id="sizeText">48</span>

<br>

<label>

<input
type="checkbox"
id="showCode"
checked
>

显示色号

</label>

<br>

<button id="convertBtn">

生成拼豆图

</button>

<button id="saveBtn">

保存图片

</button>

</div>

<canvas id="canvas"></canvas>

<div id="info"></div>

<!-- 你的palette.js -->
<script src="palette.js"></script>

<script>

/*
palette.js 格式：

const palette = [

{
    code:"H10",
    hex:"#EEE9EA"
},

{
    code:"A1",
    hex:"#F5D77A"
}

];

*/


const upload =
document.getElementById(
    "upload"
);

const canvas =
document.getElementById(
    "canvas"
);

const ctx =
canvas.getContext(
    "2d"
);

const pixelSlider =
document.getElementById(
    "pixelSize"
);

const sizeText =
document.getElementById(
    "sizeText"
);

const info =
document.getElementById(
    "info"
);

let img = null;


/* =========================
   UI
========================= */

pixelSlider.oninput=()=>{

    sizeText.innerText =
    pixelSlider.value;
};


/* =========================
   IMAGE LOAD
========================= */

upload.onchange=e=>{

    const file =
    e.target.files[0];

    if(!file) return;

    const reader =
    new FileReader();

    reader.onload=()=>{

        img = new Image();

        img.onload=()=>{

            drawOriginal();
        };

        img.src =
        reader.result;
    };

    reader.readAsDataURL(file);
};


function drawOriginal(){

    canvas.width =
    img.width;

    canvas.height =
    img.height;

    ctx.drawImage(
        img,
        0,
        0
    );
}


/* =========================
   HEX → RGB
========================= */

function hexToRgb(hex){

    hex =
    hex.replace("#","");

    return [

        parseInt(
            hex.substring(0,2),
            16
        ),

        parseInt(
            hex.substring(2,4),
            16
        ),

        parseInt(
            hex.substring(4,6),
            16
        )
    ];
}


/* =========================
   COLOR DISTANCE
========================= */

function colorDistance(a,b){

    return Math.sqrt(

        (a[0]-b[0])**2+

        (a[1]-b[1])**2+

        (a[2]-b[2])**2
    );
}


/* =========================
   FIND NEAREST
========================= */

function nearestColor(rgb){

    let best = null;

    let bestDist =
    Infinity;

    for(const p of palette){

        const prgb =
        hexToRgb(
            p.hex
        );

        const dist =
        colorDistance(
            rgb,
            prgb
        );

        if(dist<bestDist){

            bestDist = dist;

            best = p;
        }
    }

    return best;
}


/* =========================
   CONVERT
========================= */

document
.getElementById(
    "convertBtn"
)
.onclick=()=>{

    if(!img) return;

    const grid =
    parseInt(
        pixelSlider.value
    );

    const ratio =
    img.height/img.width;

    const w = grid;

    const h =
    Math.round(
        grid*ratio
    );

    const temp =
    document.createElement(
        "canvas"
    );

    temp.width = w;
    temp.height = h;

    const tctx =
    temp.getContext(
        "2d"
    );

    tctx.drawImage(

        img,

        0,
        0,

        w,
        h
    );

    const data =
    tctx.getImageData(

        0,
        0,

        w,
        h

    ).data;

    const cell = 24;

    canvas.width =
    w*cell;

    canvas.height =
    h*cell;

    ctx.clearRect(

        0,
        0,

        canvas.width,
        canvas.height
    );

    ctx.font =
"bold 10px sans-serif";

    ctx.textAlign =
    "center";

    ctx.textBaseline =
    "middle";

    const used =
    new Set();


    for(let y=0;y<h;y++){

        for(let x=0;x<w;x++){

            const i =
            (y*w+x)*4;

            const rgb = [

                data[i],
                data[i+1],
                data[i+2]
            ];

            const best =
            nearestColor(rgb);

            used.add(
                best.code
            );

            /* draw pixel */

            ctx.fillStyle =
            best.hex;

            ctx.fillRect(

                x*cell,
                y*cell,

                cell,
                cell
            );

            /* border */

            ctx.strokeStyle =
            "#000";

            ctx.strokeRect(

                x*cell,
                y*cell,

                cell,
                cell
            );

            /* color code */

            if(

                document
                .getElementById(
                    "showCode"
                )
                .checked
            ){

                const textX =
x*cell+cell/2;

const textY =
y*cell+cell/2;

/* 自动判断文字颜色 */

const rgb =
hexToRgb(best.hex);

const brightness =

(
    rgb[0]*0.299 +
    rgb[1]*0.587 +
    rgb[2]*0.114
);

/* 深色背景用白字 */

const textColor =

brightness < 140
? "#FFFFFF"
: "#000000";

/* 描边高亮 */

ctx.lineWidth = 3;

ctx.strokeStyle =

brightness < 140
? "#000000"
: "#FFFFFF";

ctx.strokeText(

    best.code,

    textX,
    textY
);

/* 正文 */

ctx.fillStyle =
textColor;

ctx.fillText(

    best.code,

    textX,
    textY
);
                );
            }
        }
    }


    /* INFO */

    info.innerText =

`尺寸：

${w} x ${h}

总像素：

${w*h}

使用色号：

${[...used].join(", ")}`;
};


/* =========================
   SAVE
========================= */

document
.getElementById(
    "saveBtn"
)
.onclick=()=>{

    const link =
    document.createElement(
        "a"
    );

    link.download =
    "mard221_pixel.png";

    link.href =
    canvas.toDataURL();

    link.click();
};

</script>

</body>
</html>
