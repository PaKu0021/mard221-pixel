<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width,initial-scale=1.0,viewport-fit=cover"
>

<title>MARD221 Pixel Generator</title>

<style>

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{

    margin:0;
    background:#111;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;

    padding:
    env(safe-area-inset-top)
    14px
    env(safe-area-inset-bottom);

    overflow-x:hidden;
}

h1{

    margin:0 0 16px;
    font-size:32px;
    font-weight:700;
}

.panel{

    background:#1b1b1d;
    border-radius:18px;
    padding:16px;
    margin-bottom:14px;
}

.row{

    margin-bottom:18px;
}

.label{

    margin-bottom:8px;
    font-size:18px;
}

input[type="range"]{

    width:100%;
}

button{

    width:100%;
    border:none;
    border-radius:16px;
    padding:18px;
    font-size:20px;
    font-weight:700;
    color:white;
    margin-top:10px;
}

#convertBtn{

    background:#4d8dff;
}

#saveBtn{

    background:#1fb45b;
}

#backBtn{

    background:#444;
    display:none;
}

canvas{

    display:block;

    margin:20px auto;

    image-rendering:pixelated;

    width:95vw;
    height:auto;

    background:#222;

    border-radius:12px;
}

.check{

    display:flex;
    align-items:center;
    gap:10px;

    margin-top:12px;

    font-size:18px;
}

#info{

    margin-top:20px;

    background:#1b1b1d;

    border-radius:18px;

    padding:18px;

    line-height:1.8;

    font-size:16px;

    white-space:pre-wrap;
}

#saveOverlay{

    position:fixed;
    inset:0;

    background:rgba(0,0,0,.88);

    display:none;

    z-index:999;

    overflow:auto;

    padding:20px;
}

#saveOverlay img{

    width:100%;
    height:auto;

    border-radius:12px;
}

.topButtons{

    display:flex;
    gap:12px;

    margin-bottom:20px;
}

.topButtons button{

    margin:0;
}

.tip{

    text-align:center;
    opacity:.7;

    margin-top:12px;
}

</style>
</head>

<body>

<h1>MARD221 Pixel Generator</h1>

<div class="panel">

<div class="row">

<div class="label">

上传图片

</div>

<input
type="file"
id="upload"
accept="image/*"
>

</div>

<div class="row">

<div class="label">

像素宽度：
<span id="widthText">64</span>

</div>

<input
type="range"
id="pixelWidth"
min="16"
max="128"
value="64"
>

</div>

<div class="row">

<div class="label">

像素格尺寸：
<span id="cellText">24</span>

</div>

<input
type="range"
id="cellSize"
min="12"
max="40"
value="24"
>

</div>

<label class="check">

<input
type="checkbox"
id="showCode"
checked
>

显示色号

</label>

<label class="check">

<input
type="checkbox"
id="showGrid"
checked
>

显示网格

</label>

<button id="convertBtn">

生成拼豆图

</button>

<button id="saveBtn">

保存到相册

</button>

</div>

<canvas id="canvas"></canvas>

<div id="info"></div>

<div id="saveOverlay">

<div class="topButtons">

<button id="backBtn">

返回编辑

</button>

<button id="iosSaveBtn">

保存到相册

</button>

</div>

<img id="previewImage">

<div class="tip">

iPad请点击“保存到相册”
<br>
若系统未弹窗，请长按图片保存

</div>

</div>

<script src="palette.js"></script>

<script>

const canvas =
document.getElementById("canvas");

const ctx =
canvas.getContext("2d");

const upload =
document.getElementById("upload");

const pixelWidth =
document.getElementById("pixelWidth");

const cellSize =
document.getElementById("cellSize");

const widthText =
document.getElementById("widthText");

const cellText =
document.getElementById("cellText");

const info =
document.getElementById("info");

const previewImage =
document.getElementById("previewImage");

const saveOverlay =
document.getElementById("saveOverlay");

const backBtn =
document.getElementById("backBtn");

let img = null;

let finalBlob = null;

widthText.innerText =
pixelWidth.value;

cellText.innerText =
cellSize.value;

pixelWidth.oninput=()=>{

    widthText.innerText =
    pixelWidth.value;
};

cellSize.oninput=()=>{

    cellText.innerText =
    cellSize.value;
};

upload.onchange=e=>{

    const file =
    e.target.files[0];

    if(!file) return;

    const reader =
    new FileReader();

    reader.onload=()=>{

        img = new Image();

        img.onload=()=>{

            drawPreview();
        };

        img.src =
        reader.result;
    };

    reader.readAsDataURL(file);
};

function drawPreview(){

    canvas.width =
    img.width;

    canvas.height =
    img.height;

    ctx.drawImage(
        img,
        0,
        0
    );
}

function hexToRgb(hex){

    hex =
    hex.replace("#","");

    return [

        parseInt(hex.substring(0,2),16),

        parseInt(hex.substring(2,4),16),

        parseInt(hex.substring(4,6),16)
    ];
}

function distance(a,b){

    return Math.sqrt(

        (a[0]-b[0])**2+
        (a[1]-b[1])**2+
        (a[2]-b[2])**2
    );
}

function nearest(rgb){

    let best = null;

    let bestDist =
    Infinity;

    for(const p of palette){

        const prgb =
        hexToRgb(p.hex);

        const d =
        distance(rgb,prgb);

        if(d<bestDist){

            bestDist=d;
            best=p;
        }
    }

    return best;
}

document
.getElementById("convertBtn")
.onclick=()=>{

    if(!img) return;

    const w =
    parseInt(pixelWidth.value);

    const ratio =
    img.height/img.width;

    const h =
    Math.round(w*ratio);

    const temp =
    document.createElement("canvas");

    temp.width=w;
    temp.height=h;

    const tctx =
    temp.getContext("2d");

    tctx.drawImage(
        img,
        0,
        0,
        w,
        h
    );

    const data =
    tctx.getImageData(
        0,
        0,
        w,
        h
    ).data;

    canvas.width=w;
    canvas.height=h;

    const imageData =
    ctx.createImageData(w,h);

    const used =
    new Set();

    const pixelMap=[];

    for(let y=0;y<h;y++){

        pixelMap[y]=[];

        for(let x=0;x<w;x++){

            const i =
            (y*w+x)*4;

            const rgb=[

                data[i],
                data[i+1],
                data[i+2]
            ];

            const best =
            nearest(rgb);

            pixelMap[y][x]=best;

            used.add(best.code);

            const prgb =
            hexToRgb(best.hex);

            imageData.data[i]=prgb[0];
            imageData.data[i+1]=prgb[1];
            imageData.data[i+2]=prgb[2];
            imageData.data[i+3]=255;
        }
    }

    ctx.putImageData(
        imageData,
        0,
        0
    );

    info.innerText=

`尺寸：
${w} x ${h}

总像素：
${w*h}

使用色号：
${[...used].join(", ")}`;

    window.pixelMap=
    pixelMap;

    window.gridWidth=w;
    window.gridHeight=h;
};

document
.getElementById("saveBtn")
.onclick=async()=>{

    if(!window.pixelMap) return;

    const cell =
    parseInt(cellSize.value);

    const w =
    window.gridWidth;

    const h =
    window.gridHeight;

    const exportCanvas =
    document.createElement("canvas");

    const extraHeight=260;

    exportCanvas.width =
    w*cell;

    exportCanvas.height =
    h*cell+extraHeight;

    const ectx =
    exportCanvas.getContext("2d");

    ectx.fillStyle="#111";
    ectx.fillRect(
        0,
        0,
        exportCanvas.width,
        exportCanvas.height
    );

    ectx.font=
    `bold ${Math.max(10,cell*0.28)}px sans-serif`;

    ectx.textAlign="center";
    ectx.textBaseline="middle";

    for(let y=0;y<h;y++){

        for(let x=0;x<w;x++){

            const p =
            window.pixelMap[y][x];

            ectx.fillStyle=p.hex;

            ectx.fillRect(

                x*cell,
                y*cell,

                cell,
                cell
            );

            if(
                document
                .getElementById("showGrid")
                .checked
            ){

                ectx.strokeStyle=
                "#000";

                ectx.strokeRect(

                    x*cell,
                    y*cell,

                    cell,
                    cell
                );
            }

            if(
                document
                .getElementById("showCode")
                .checked
            ){

                const rgb =
                hexToRgb(p.hex);

                const brightness =

                    rgb[0]*0.299+
                    rgb[1]*0.587+
                    rgb[2]*0.114;

                const tx=
                x*cell+cell/2;

                const ty=
                y*cell+cell/2;

                ectx.lineWidth=2;

                ectx.strokeStyle=
                brightness<140
                ? "#000"
                : "#FFF";

                ectx.fillStyle=
                brightness<140
                ? "#FFF"
                : "#000";

                ectx.strokeText(
                    p.code,
                    tx,
                    ty
                );

                ectx.fillText(
                    p.code,
                    tx,
                    ty
                );
            }
        }
    }

    ectx.fillStyle="#FFF";

    ectx.font="28px sans-serif";

    ectx.textAlign="left";

    const used =
    [...new Set(
        window.pixelMap
        .flat()
        .map(v=>v.code)
    )];

    const startY =
    h*cell+50;

    ectx.fillText(
        `尺寸：${w} x ${h}`,
        30,
        startY
    );

    ectx.fillText(
        `总像素：${w*h}`,
        30,
        startY+45
    );

    ectx.fillText(
        `使用色号：`,
        30,
        startY+90
    );

    let yy=
    startY+135;

    let line="";

    for(let i=0;i<used.length;i++){

        line+=used[i]+" ";

        if(line.length>60){

            ectx.fillText(
                line,
                30,
                yy
            );

            yy+=38;

            line="";
        }
    }

    if(line){

        ectx.fillText(
            line,
            30,
            yy
        );
    }

    exportCanvas.toBlob(async(blob)=>{

        finalBlob=blob;

        const url =
        URL.createObjectURL(blob);

        previewImage.src=url;

        saveOverlay.style.display=
        "block";

        backBtn.style.display=
        "block";

    },"image/png");
};

backBtn.onclick=()=>{

    saveOverlay.style.display=
    "none";
};

document
.getElementById("iosSaveBtn")
.onclick=async()=>{

    if(!finalBlob) return;

    const file =
    new File(

        [finalBlob],

        "mard221.png",

        {
            type:"image/png"
        }
    );

    if(

        navigator.canShare &&
        navigator.canShare({
            files:[file]
        })

    ){

        try{

            await navigator.share({

                files:[file],

                title:"MARD221"
            });

        }catch(e){}
    }
};

</script>

</body>
</html>
