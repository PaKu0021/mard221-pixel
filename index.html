<!DOCTYPE html>
<html lang="zh">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Mard221 拼豆图纸生成器</title>

<style>

body{

    background:#111;
    color:white;
    font-family:sans-serif;
    text-align:center;
    margin:0;
    padding:20px;
}

h1{

    margin-bottom:20px;
}

canvas{

    border:1px solid #444;
    background:white;
    max-width:95vw;
    margin-top:20px;

    image-rendering:pixelated;
}

button,input{

    margin:10px;
}

#info{

    margin-top:20px;

    background:#1b1b1b;

    padding:20px;

    border-radius:12px;

    max-width:900px;

    margin-left:auto;
    margin-right:auto;

    text-align:left;
}

.colorItem{

    display:inline-block;

    margin:4px;

    padding:6px 10px;

    background:#222;

    border-radius:8px;
}

</style>

</head>

<body>

<h1>

Mard221 拼豆图纸生成器

</h1>

<input
type="file"
id="upload"
accept="image/*">

<br>

像素尺寸：

<input
type="range"
id="size"
min="16"
max="128"
value="48">

<span id="sizeText">

48

</span>

<br>

<button id="saveBtn">

保存到iPad照片

</button>

<br>

<canvas id="canvas"></canvas>

<div id="info">

等待生成...

</div>

<!-- 色盘 -->

<script src="palette.js"></script>

<script>

const upload =
    document.getElementById(
        "upload"
    );

const canvas =
    document.getElementById(
        "canvas"
    );

const ctx =
    canvas.getContext("2d");

const slider =
    document.getElementById(
        "size"
    );

slider.oninput = ()=>{

    document.getElementById(
        "sizeText"
    ).innerText =
        slider.value;
};

let originalImage = null;

upload.addEventListener(
    "change",
    (e)=>{

        const file =
            e.target.files[0];

        const img =
            new Image();

        img.onload = ()=>{

            originalImage = img;

            generate();
        };

        img.src =
            URL.createObjectURL(file);
    }
);

function nearestColor(r,g,b){

    let best = null;

    let bestDist = 999999999;

    for(const p of palette){

        const pr = p.rgb[0];
        const pg = p.rgb[1];
        const pb = p.rgb[2];

        const dr = r-pr;
        const dg = g-pg;
        const db = b-pb;

        const dist =
            dr*dr+
            dg*dg+
            db*db;

        if(dist < bestDist){

            bestDist = dist;

            best = p;
        }
    }

    return best;
}

function generate(){

    const gridSize =
        parseInt(slider.value);

    const ratio =
        originalImage.width /
        originalImage.height;

    let w,h;

    if(ratio > 1){

        w = gridSize;

        h = Math.round(
            gridSize / ratio
        );

    }else{

        h = gridSize;

        w = Math.round(
            gridSize * ratio
        );
    }

    const temp =
        document.createElement(
            "canvas"
        );

    temp.width = w;
    temp.height = h;

    const tctx =
        temp.getContext("2d");

    tctx.drawImage(
        originalImage,
        0,
        0,
        w,
        h
    );

    const imgData =
        tctx.getImageData(
            0,
            0,
            w,
            h
        );

    const data =
        imgData.data;

    const grid = [];

    const usage = {};

    for(let y=0;y<h;y++){

        const row=[];

        for(let x=0;x<w;x++){

            const i=
                (y*w+x)*4;

            const r=data[i];
            const g=data[i+1];
            const b=data[i+2];

            const nc=
                nearestColor(
                    r,g,b
                );

            row.push(nc);

            if(!usage[nc.code]){

                usage[nc.code]=0;
            }

            usage[nc.code]++;
        }

        grid.push(row);
    }

    const cell = 24;

    canvas.width =
        w * cell;

    canvas.height =
        h * cell;

    ctx.fillStyle =
        "white";

    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    ctx.textAlign =
        "center";

    ctx.textBaseline =
        "middle";

    ctx.font =
        "10px sans-serif";

    for(let y=0;y<h;y++){

        for(let x=0;x<w;x++){

            const p =
                grid[y][x];

            const px =
                x*cell;

            const py =
                y*cell;

            ctx.fillStyle =
                `rgb(
                    ${p.rgb[0]},
                    ${p.rgb[1]},
                    ${p.rgb[2]}
                )`;

            ctx.fillRect(
                px,
                py,
                cell,
                cell
            );

            ctx.strokeStyle =
                "#666";

            ctx.strokeRect(
                px,
                py,
                cell,
                cell
            );

            const brightness =
                (
                    p.rgb[0]+
                    p.rgb[1]+
                    p.rgb[2]
                ) / 3;

            ctx.fillStyle =
                brightness > 140
                ? "black"
                : "white";

            ctx.fillText(
                p.code,
                px + cell/2,
                py + cell/2
            );
        }
    }

    renderInfo(
        w,
        h,
        usage
    );
}

function renderInfo(w,h,usage){

    const info =
        document.getElementById(
            "info"
        );

    let html = `

    <h2>
    图纸信息
    </h2>

    <p>

    尺寸：

    ${w} × ${h} 格

    </p>

    <h3>
    使用颜色
    </h3>

    `;

    const keys =
        Object.keys(usage)
        .sort();

    for(const k of keys){

        html += `

        <div class="colorItem">

        ${k} × ${usage[k]}

        </div>

        `;
    }

    info.innerHTML = html;
}

document.getElementById(
    "saveBtn"
).onclick = async()=>{

    canvas.toBlob(
        async(blob)=>{

            const file =
                new File(

                    [blob],

                    "mard221_pattern.png",

                    {
                        type:"image/png"
                    }
                );

            if(navigator.canShare){

                await navigator.share({

                    files:[file],

                    title:
                    "Mard221 Pattern"

                });

            }else{

                const url =
                    URL.createObjectURL(
                        blob
                    );

                window.open(url);
            }
        }
    );
};

</script>

</body>

</html>
