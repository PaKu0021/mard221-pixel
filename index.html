<!DOCTYPE html>
<html lang="zh">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no"
>

<title>MARD221 Pixel Generator</title>

<style>

*{

    box-sizing:border-box;

    -webkit-tap-highlight-color:transparent;
}

body{

    margin:0;

    background:#111;

    color:white;

    font-family:sans-serif;

    overflow-x:hidden;
}

/* =========================
   TOP BAR
========================= */

.topbar{

    position:sticky;

    top:0;

    z-index:1000;

    background:#1a1a1a;

    padding:

    env(safe-area-inset-top)
    12px
    12px
    12px;

    border-bottom:
    1px solid #333;
}

.topbar h1{

    margin:0 0 12px 0;

    font-size:22px;
}

/* =========================
   CONTROLS
========================= */

.controls{

    display:flex;

    flex-direction:column;

    gap:10px;
}

.control-group{

    background:#222;

    padding:12px;

    border-radius:12px;
}

.row{

    display:flex;

    align-items:center;

    justify-content:space-between;

    gap:10px;
}

input[type="range"]{

    width:100%;
}

button{

    width:100%;

    border:none;

    border-radius:12px;

    padding:14px;

    font-size:16px;

    background:#333;

    color:white;
}

button:active{

    transform:scale(0.98);
}

.primary{

    background:#4A8CFF;
}

.success{

    background:#1E9E59;
}

/* =========================
   CANVAS
========================= */

.main{

    padding:16px;
}

.canvas-wrap{

    display:flex;

    justify-content:center;
}

canvas{

    background:#222;

    border:1px solid #444;

    image-rendering:pixelated;

    max-width:95vw;
}

/* =========================
   INFO
========================= */

#info{

    margin-top:20px;

    background:#1c1c1c;

    border-radius:12px;

    padding:14px;

    white-space:pre-wrap;

    line-height:1.6;
}

/* =========================
   PREVIEW MODAL
========================= */

.modal{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,0.92);

    display:none;

    flex-direction:column;

    z-index:9999;
}

.modal-top{

    display:flex;

    gap:10px;

    padding:

    env(safe-area-inset-top)
    12px
    12px
    12px;

    background:#111;

    border-bottom:
    1px solid #333;
}

.modal-top button{

    flex:1;
}

.preview-wrap{

    flex:1;

    overflow:auto;

    display:flex;

    justify-content:center;

    align-items:flex-start;

    padding:20px;
}

.preview-wrap img{

    max-width:100%;

    height:auto;

    image-rendering:pixelated;

    background:white;
}

</style>

</head>

<body>

<!-- =========================
TOP
========================= -->

<div class="topbar">

<h1>MARD221 Pixel Generator</h1>

<div class="controls">

<div class="control-group">

<div class="row">

<span>上传图片</span>

<input
type="file"
id="upload"
accept="image/*"
>

</div>

</div>

<div class="control-group">

<div class="row">

<span>
像素宽度
</span>

<span id="sizeText">
48
</span>

</div>

<input
type="range"
id="pixelSize"
min="16"
max="128"
value="48"
>

</div>

<div class="control-group">

<div class="row">

<span>
像素格尺寸
</span>

<span id="cellText">
32
</span>

</div>

<input
type="range"
id="cellSize"
min="16"
max="64"
value="32"
>

</div>

<div class="control-group">

<label>

<input
type="checkbox"
id="showCode"
checked
>

显示色号

</label>

<br><br>

<label>

<input
type="checkbox"
id="showGrid"
checked
>

显示网格

</label>

</div>

<button
id="convertBtn"
class="primary"
>

生成拼豆图

</button>

<button
id="saveBtn"
class="success"
>

保存图片

</button>

</div>

</div>

<!-- =========================
MAIN
========================= -->

<div class="main">

<div class="canvas-wrap">

<canvas id="canvas"></canvas>

</div>

<div id="info"></div>

</div>

<!-- =========================
MODAL
========================= -->

<div
class="modal"
id="previewModal"
>

<div class="modal-top">

<button id="closePreview">

返回编辑

</button>

<button id="savePhoto">

保存到相册

</button>

</div>

<div class="preview-wrap">

<img id="previewImage">

</div>

</div>

<script src="palette.js"></script>

<script>

/* =========================
ELEMENTS
========================= */

const upload =
document.getElementById(
"upload"
);

const canvas =
document.getElementById(
"canvas"
);

const ctx =
canvas.getContext(
"2d"
);

const pixelSlider =
document.getElementById(
"pixelSize"
);

const sizeText =
document.getElementById(
"sizeText"
);

const cellSlider =
document.getElementById(
"cellSize"
);

const cellText =
document.getElementById(
"cellText"
);

const info =
document.getElementById(
"info"
);

const modal =
document.getElementById(
"previewModal"
);

const previewImage =
document.getElementById(
"previewImage"
);

let img = null;

let lastUsedColors = [];

let lastW = 0;

let lastH = 0;


/* =========================
UI
========================= */

pixelSlider.oninput=()=>{

sizeText.innerText =
pixelSlider.value;
};

cellSlider.oninput=()=>{

cellText.innerText =
cellSlider.value;
};


/* =========================
LOAD IMAGE
========================= */

upload.onchange=e=>{

const file =
e.target.files[0];

if(!file) return;

const reader =
new FileReader();

reader.onload=()=>{

img = new Image();

img.onload=()=>{

canvas.width =
img.width;

canvas.height =
img.height;

ctx.drawImage(
img,
0,
0
);
};

img.src =
reader.result;
};

reader.readAsDataURL(file);
};


/* =========================
UTIL
========================= */

function hexToRgb(hex){

hex =
hex.replace("#","");

return [

parseInt(
hex.substring(0,2),
16
),

parseInt(
hex.substring(2,4),
16
),

parseInt(
hex.substring(4,6),
16
)
];
}

function colorDistance(a,b){

return Math.sqrt(

(a[0]-b[0])**2+

(a[1]-b[1])**2+

(a[2]-b[2])**2
);
}

function nearestColor(rgb){

let best = null;

let bestDist =
Infinity;

for(const p of palette){

const prgb =
hexToRgb(
p.hex
);

const dist =
colorDistance(
rgb,
prgb
);

if(dist < bestDist){

bestDist =
dist;

best = p;
}
}

return best;
}


/* =========================
CONVERT
========================= */

document
.getElementById(
"convertBtn"
)
.onclick=()=>{

if(!img){

alert("请先上传图片");

return;
}

const grid =
parseInt(
pixelSlider.value
);

const ratio =
img.height /
img.width;

const w =
grid;

const h =
Math.round(
grid*ratio
);

lastW = w;
lastH = h;

const temp =
document.createElement(
"canvas"
);

temp.width = w;

temp.height = h;

const tctx =
temp.getContext(
"2d"
);

tctx.drawImage(

img,

0,
0,

w,
h
);

const data =
tctx.getImageData(

0,
0,

w,
h

).data;

const cell =
parseInt(
cellSlider.value
);

canvas.width =
w*cell;

canvas.height =
h*cell;

ctx.clearRect(

0,
0,

canvas.width,
canvas.height
);

ctx.imageSmoothingEnabled =
false;

ctx.textAlign =
"center";

ctx.textBaseline =
"middle";

ctx.font =

`bold ${
Math.floor(
Math.max(
8,
cell*0.32
))
}px sans-serif`;

const used =
new Set();

for(let y=0;y<h;y++){

for(let x=0;x<w;x++){

const i =
(y*w+x)*4;

const pixelRgb = [

data[i],
data[i+1],
data[i+2]
];

const best =
nearestColor(
pixelRgb
);

used.add(
best.code
);

const rgb2 =
hexToRgb(
best.hex
);

const brightness =

(
rgb2[0]*0.299 +
rgb2[1]*0.587 +
rgb2[2]*0.114
);

ctx.fillStyle =
best.hex;

ctx.fillRect(

x*cell,
y*cell,

cell,
cell
);

if(

document
.getElementById(
"showGrid"
)
.checked
){

ctx.lineWidth =

Math.max(
1,
cell*0.08
);

ctx.strokeStyle =

brightness < 80
? "#FFFFFF55"
: "#00000055";

ctx.strokeRect(

x*cell,
y*cell,

cell,
cell
);
}

if(

document
.getElementById(
"showCode"
)
.checked
){

const textX =
x*cell+cell/2;

const textY =
y*cell+cell/2;

const textColor =

brightness < 140
? "#FFFFFF"
: "#000000";

ctx.lineWidth =

Math.max(
1,
cell*0.12
);

ctx.strokeStyle =

brightness < 140
? "#000000"
: "#FFFFFF";

ctx.strokeText(

best.code,

textX,
textY
);

ctx.fillStyle =
textColor;

ctx.fillText(

best.code,

textX,
textY
);
}
}
}

lastUsedColors =
[...used].sort();

info.innerText =

`尺寸:
${w} x ${h}

总像素:
${w*h}

使用色号:
${lastUsedColors.join(", ")}`;
};


/* =========================
SAVE
========================= */

document
.getElementById(
"saveBtn"
)
.onclick=()=>{

if(!img){

alert("请先生成拼豆图");

return;
}

const scale = 4;

const padding = 40;

const infoHeight = 260;

const exportCanvas =
document.createElement(
"canvas"
);

exportCanvas.width =

canvas.width*scale;

exportCanvas.height =

canvas.height*scale
+ infoHeight;

const exctx =
exportCanvas.getContext(
"2d"
);

exctx.imageSmoothingEnabled =
false;

exctx.fillStyle =
"#FFFFFF";

exctx.fillRect(

0,
0,

exportCanvas.width,
exportCanvas.height
);

exctx.drawImage(

canvas,

0,
0,

canvas.width,
canvas.height,

0,
0,

canvas.width*scale,
canvas.height*scale
);

exctx.fillStyle =
"#111";

exctx.fillRect(

0,

canvas.height*scale,

exportCanvas.width,

infoHeight
);

exctx.fillStyle =
"#FFF";

exctx.textAlign =
"left";

exctx.textBaseline =
"top";

exctx.font =
"bold 32px sans-serif";

let y =

canvas.height*scale
+ padding;

exctx.fillText(

`尺寸: ${lastW} x ${lastH}`,

padding,
y
);

y += 50;

exctx.fillText(

`总像素: ${lastW*lastH}`,

padding,
y
);

y += 60;

exctx.fillText(

`使用色号:`,

padding,
y
);

y += 45;

exctx.font =
"28px sans-serif";

let line = "";

const maxWidth =

exportCanvas.width
- padding*2;

for(let i=0;i<lastUsedColors.length;i++){

const testLine =

line +
lastUsedColors[i] +
"  ";

const metrics =
exctx.measureText(
testLine
);

if(
metrics.width >
maxWidth
){

exctx.fillText(

line,

padding,
y
);

line =
lastUsedColors[i]
+ "  ";

y += 38;

}else{

line =
testLine;
}
}

exctx.fillText(

line,

padding,
y
);

const url =
exportCanvas.toDataURL(
"image/png"
);

previewImage.src =
url;

modal.style.display =
"flex";
};


/* =========================
MODAL
========================= */

document
.getElementById(
"closePreview"
)
.onclick=()=>{

modal.style.display =
"none";
};

document
.getElementById(
"savePhoto"
)
.onclick=async()=>{

    try{

        const response =
        await fetch(
            previewImage.src
        );

        const blob =
        await response.blob();

        const file =
        new File(

            [blob],

            "mard221_pixel.png",

            {
                type:"image/png"
            }
        );

        if(
            navigator.canShare &&
            navigator.canShare({
                files:[file]
            })
        ){

            await navigator.share({

                files:[file],

                title:
                "MARD221 Pixel"
            });

        }else{

            alert(
                "当前浏览器不支持保存到相册"
            );
        }

    }catch(e){

        console.log(e);

        alert(
            "保存失败"
        );
    }
};

</script>

</body>
</html>
