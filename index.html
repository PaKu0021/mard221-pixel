<!DOCTYPE html>
<html lang="zh">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0"
>

<title>MARD221 Pixel Generator</title>

<style>

body{

    background:#111;
    color:white;

    font-family:sans-serif;

    text-align:center;

    padding:20px;
    margin:0;
}

h1{

    margin-bottom:20px;
}

.controls{

    margin-bottom:20px;
}

canvas{

    background:#222;

    border:1px solid #555;

    image-rendering:pixelated;

    max-width:95vw;
}

button,
input{

    margin:8px;
}

#info{

    margin-top:20px;

    white-space:pre-wrap;

    text-align:left;

    max-width:1000px;

    margin-left:auto;
    margin-right:auto;

    background:#1a1a1a;

    padding:12px;

    border-radius:8px;
}

label{

    user-select:none;
}

button{

    padding:10px 20px;

    border:none;

    border-radius:8px;

    background:#333;

    color:white;

    font-size:16px;
}

button:active{

    transform:scale(0.98);
}

</style>

</head>

<body>

<h1>MARD221 Pixel Generator</h1>

<div class="controls">

<input
type="file"
id="upload"
accept="image/*"
>

<br>

像素宽度：

<input
type="range"
id="pixelSize"
min="16"
max="128"
value="48"
>

<span id="sizeText">48</span>

<br>

像素格尺寸：

<input
type="range"
id="cellSize"
min="16"
max="64"
value="32"
>

<span id="cellText">32</span>

<br>

<label>

<input
type="checkbox"
id="showCode"
checked
>

显示色号

</label>

<br>

<label>

<input
type="checkbox"
id="showGrid"
checked
>

显示网格

</label>

<br>

<button id="convertBtn">

生成拼豆图

</button>

<button id="saveBtn">

保存图片

</button>

</div>

<canvas id="canvas"></canvas>

<div id="info"></div>

<script src="palette.js"></script>

<script>

/* =========================
   ELEMENTS
========================= */

const upload =
document.getElementById(
    "upload"
);

const canvas =
document.getElementById(
    "canvas"
);

const ctx =
canvas.getContext(
    "2d"
);

const pixelSlider =
document.getElementById(
    "pixelSize"
);

const sizeText =
document.getElementById(
    "sizeText"
);

const cellSlider =
document.getElementById(
    "cellSize"
);

const cellText =
document.getElementById(
    "cellText"
);

const info =
document.getElementById(
    "info"
);

let img = null;

let lastUsedColors = [];

let lastW = 0;

let lastH = 0;


/* =========================
   UI
========================= */

pixelSlider.oninput=()=>{

    sizeText.innerText =
    pixelSlider.value;
};

cellSlider.oninput=()=>{

    cellText.innerText =
    cellSlider.value;
};


/* =========================
   IMAGE LOAD
========================= */

upload.onchange=e=>{

    const file =
    e.target.files[0];

    if(!file) return;

    const reader =
    new FileReader();

    reader.onload=()=>{

        img = new Image();

        img.onload=()=>{

            drawOriginal();
        };

        img.src =
        reader.result;
    };

    reader.readAsDataURL(file);
};


function drawOriginal(){

    canvas.width =
    img.width;

    canvas.height =
    img.height;

    ctx.drawImage(

        img,

        0,
        0
    );
}


/* =========================
   HEX → RGB
========================= */

function hexToRgb(hex){

    hex =
    hex.replace("#","");

    return [

        parseInt(
            hex.substring(0,2),
            16
        ),

        parseInt(
            hex.substring(2,4),
            16
        ),

        parseInt(
            hex.substring(4,6),
            16
        )
    ];
}


/* =========================
   COLOR DISTANCE
========================= */

function colorDistance(a,b){

    return Math.sqrt(

        (a[0]-b[0])**2+

        (a[1]-b[1])**2+

        (a[2]-b[2])**2
    );
}


/* =========================
   FIND NEAREST COLOR
========================= */

function nearestColor(rgb){

    let best = null;

    let bestDist =
    Infinity;

    for(const p of palette){

        const prgb =
        hexToRgb(
            p.hex
        );

        const dist =
        colorDistance(
            rgb,
            prgb
        );

        if(dist < bestDist){

            bestDist =
            dist;

            best =
            p;
        }
    }

    return best;
}


/* =========================
   CONVERT
========================= */

document
.getElementById(
    "convertBtn"
)
.onclick=()=>{

    if(!img){

        alert(
            "请先上传图片"
        );

        return;
    }

    const grid =
    parseInt(
        pixelSlider.value
    );

    const ratio =
    img.height /
    img.width;

    const w =
    grid;

    const h =
    Math.round(
        grid * ratio
    );

    lastW = w;
    lastH = h;

    const temp =
    document.createElement(
        "canvas"
    );

    temp.width =
    w;

    temp.height =
    h;

    const tctx =
    temp.getContext(
        "2d"
    );

    tctx.drawImage(

        img,

        0,
        0,

        w,
        h
    );

    const data =
    tctx.getImageData(

        0,
        0,

        w,
        h

    ).data;

    const cell =
    parseInt(
        cellSlider.value
    );

    canvas.width =
    w * cell;

    canvas.height =
    h * cell;

    ctx.clearRect(

        0,
        0,

        canvas.width,
        canvas.height
    );

    ctx.imageSmoothingEnabled =
    false;

    ctx.textAlign =
    "center";

    ctx.textBaseline =
    "middle";

    ctx.font =

    `bold ${
    Math.floor(

        Math.max(
            8,
            cell * 0.32
        )

    )}px sans-serif`;

    const used =
    new Set();


    for(let y=0;y<h;y++){

        for(let x=0;x<w;x++){

            const i =
            (y*w+x)*4;

            const pixelRgb = [

                data[i],
                data[i+1],
                data[i+2]
            ];

            const best =
            nearestColor(
                pixelRgb
            );

            used.add(
                best.code
            );

            const rgb2 =
            hexToRgb(
                best.hex
            );

            const brightness =

            (
                rgb2[0]*0.299 +
                rgb2[1]*0.587 +
                rgb2[2]*0.114
            );

            /* pixel */

            ctx.fillStyle =
            best.hex;

            ctx.fillRect(

                x*cell,
                y*cell,

                cell,
                cell
            );

            /* grid */

            if(

                document
                .getElementById(
                    "showGrid"
                )
                .checked
            ){

                ctx.lineWidth =

                Math.max(
                    1,
                    cell*0.08
                );

                ctx.strokeStyle =

                brightness < 80
                ? "#FFFFFF55"
                : "#00000055";

                ctx.strokeRect(

                    x*cell,
                    y*cell,

                    cell,
                    cell
                );
            }

            /* code */

            if(

                document
                .getElementById(
                    "showCode"
                )
                .checked
            ){

                const textX =
                x*cell + cell/2;

                const textY =
                y*cell + cell/2;

                const textColor =

                brightness < 140
                ? "#FFFFFF"
                : "#000000";

                ctx.lineWidth =

                Math.max(
                    1,
                    cell*0.12
                );

                ctx.strokeStyle =

                brightness < 140
                ? "#000000"
                : "#FFFFFF";

                ctx.strokeText(

                    best.code,

                    textX,
                    textY
                );

                ctx.fillStyle =
                textColor;

                ctx.fillText(

                    best.code,

                    textX,
                    textY
                );
            }
        }
    }

    lastUsedColors =
    [...used].sort();

    info.innerText =

`尺寸：

${w} x ${h}

总像素：

${w*h}

使用色号：

${lastUsedColors.join(", ")}`;
};


/* =========================
   SAVE
========================= */

document
.getElementById(
    "saveBtn"
)
.onclick=()=>{

    if(!img){

        alert(
            "请先生成拼豆图"
        );

        return;
    }

    const scale = 4;

    const padding = 40;

    const infoHeight = 260;

    const exportCanvas =
    document.createElement(
        "canvas"
    );

    exportCanvas.width =

    canvas.width * scale;

    exportCanvas.height =

    canvas.height * scale
    + infoHeight;

    const exctx =
    exportCanvas.getContext(
        "2d"
    );

    exctx.imageSmoothingEnabled =
    false;

    /* 白底 */

    exctx.fillStyle =
    "#FFFFFF";

    exctx.fillRect(

        0,
        0,

        exportCanvas.width,
        exportCanvas.height
    );

    /* 拼豆图 */

    exctx.drawImage(

        canvas,

        0,
        0,

        canvas.width,
        canvas.height,

        0,
        0,

        canvas.width * scale,
        canvas.height * scale
    );

    /* 信息栏 */

    exctx.fillStyle =
    "#111111";

    exctx.fillRect(

        0,

        canvas.height * scale,

        exportCanvas.width,

        infoHeight
    );

    exctx.fillStyle =
    "#FFFFFF";

    exctx.textAlign =
    "left";

    exctx.textBaseline =
    "top";

    exctx.font =
    "bold 32px sans-serif";

    let y =
    canvas.height * scale
    + padding;

    exctx.fillText(

        `尺寸: ${lastW} x ${lastH}`,

        padding,
        y
    );

    y += 50;

    exctx.fillText(

        `总像素: ${lastW*lastH}`,

        padding,
        y
    );

    y += 60;

    exctx.fillText(

        `使用色号:`,

        padding,
        y
    );

    y += 45;

    exctx.font =
    "28px sans-serif";

    let line = "";

    const maxWidth =
    exportCanvas.width
    - padding*2;

    for(let i=0;i<lastUsedColors.length;i++){

        const testLine =

        line +
        lastUsedColors[i] +
        "  ";

        const metrics =
        exctx.measureText(
            testLine
        );

        if(
            metrics.width >
            maxWidth
        ){

            exctx.fillText(

                line,

                padding,
                y
            );

            line =
            lastUsedColors[i] + "  ";

            y += 38;

        }else{

            line =
            testLine;
        }
    }

    exctx.fillText(

        line,

        padding,
        y
    );

    /* 打开图片页 */

    const url =
    exportCanvas.toDataURL(
        "image/png"
    );

    const newTab =
    window.open();

    newTab.document.write(`

        <html>

        <head>

        <title>
        MARD221 Pixel
        </title>

        <style>

        body{

            margin:0;

            background:#111;

            display:flex;

            justify-content:center;

            align-items:center;

            min-height:100vh;
        }

        img{

            max-width:100%;

            height:auto;
        }

        </style>

        </head>

        <body>

        <img src="${url}">

        </body>

        </html>

    `);
};

</script>

</body>
</html>
